server:
  port: 8080

spring:
  application:
    name: directorio-cristiano-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/directorio_cristiano
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:defaultSecretKeyThatMustBeChangedInProductionAtLeast256BitsLong}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000

  gemini:
    api-key: ${GEMINI_API_KEY:}
    api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.directoriocristiano: DEBUG
    org.springframework.security: INFO
    org.hibernate.orm.jdbc.bind: TRACE
